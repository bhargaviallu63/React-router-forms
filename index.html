<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Student Management System</title>
<style>
body{font-family:Arial;margin:0;background:#f4f4f4}
header{background:#2563eb;color:white;padding:15px;text-align:center}
.container{max-width:1100px;margin:auto;padding:20px}
.card{background:white;padding:15px;border-radius:10px;margin-bottom:15px;box-shadow:0 2px 6px rgba(0,0,0,.1)}
input,select{padding:10px;margin:5px;width:calc(50% - 20px)}
button{padding:10px 15px;cursor:pointer}
table{width:100%;border-collapse:collapse}
th,td{border:1px solid #ddd;padding:8px}
th{background:#e5e7eb}
.stats{display:flex;gap:10px;flex-wrap:wrap}
.stat{flex:1;background:white;padding:15px;border-radius:10px;text-align:center}
</style>
</head>
<body>
<header><h1>Advanced Student Management System</h1></header>

<div class="container">

<div class="stats">
<div class="stat"><h2 id="totalStudents">0</h2><p>Total Students</p></div>
<div class="stat"><h2 id="totalCourses">0</h2><p>Total Courses</p></div>
</div>

<div class="card">
<h2>Add Student</h2>
<input id="name" placeholder="Name">
<input id="email" placeholder="Email">
<input id="phone" placeholder="Phone">
<input id="course" placeholder="Course">
<br>
<button onclick="addStudent()">Add Student</button>
</div>

<div class="card">
<h2>Search</h2>
<input id="search" placeholder="Search by name" onkeyup="renderTable()">
</div>

<div class="card">
<h2>Students</h2>
<table>
<thead>
<tr>
<th>Name</th>
<th>Email</th>
<th>Phone</th>
<th>Course</th>
<th>Action</th>
</tr>
</thead>
<tbody id="studentTable"></tbody>
</table>
</div>

</div>

<script>
let students = JSON.parse(localStorage.getItem('students')||'[]');

function save(){
 localStorage.setItem('students',JSON.stringify(students));
}

function updateStats(){
 document.getElementById('totalStudents').innerText=students.length;
 const courses=[...new Set(students.map(s=>s.course))];
 document.getElementById('totalCourses').innerText=courses.length;
}

function addStudent(){
 const name=document.getElementById('name').value;
 const email=document.getElementById('email').value;
 const phone=document.getElementById('phone').value;
 const course=document.getElementById('course').value;

 if(!name||!email||!phone||!course){
   alert('Fill all fields');
   return;
 }

 students.push({name,email,phone,course});
 save();
 renderTable();

 document.getElementById('name').value='';
 document.getElementById('email').value='';
 document.getElementById('phone').value='';
 document.getElementById('course').value='';
}

function deleteStudent(i){
 students.splice(i,1);
 save();
 renderTable();
}

function renderTable(){
 const q=document.getElementById('search').value.toLowerCase();
 const tbody=document.getElementById('studentTable');
 tbody.innerHTML='';

 students.forEach((s,i)=>{
   if(s.name.toLowerCase().includes(q)){
      tbody.innerHTML += `
      <tr>
      <td>${s.name}</td>
      <td>${s.email}</td>
      <td>${s.phone}</td>
      <td>${s.course}</td>
      <td><button onclick="deleteStudent(${i})">Delete</button></td>
      </tr>`;
   }
 });
 updateStats();
}

renderTable();
</script>
</body>
</html>
