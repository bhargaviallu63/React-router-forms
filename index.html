<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>React Router & Forms Assessment</title>

<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/react-router-dom@6/umd/react-router-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f4f4;
    margin:0;
}

.container{
    max-width:700px;
    margin:40px auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

nav{
    background:#007bff;
    padding:15px;
}

nav a{
    color:white;
    text-decoration:none;
    margin-right:15px;
    font-weight:bold;
}

input{
    width:100%;
    padding:10px;
    margin-top:5px;
    margin-bottom:10px;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    background:#007bff;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}

.error{
    color:red;
    font-size:14px;
}
</style>
</head>

<body>

<div id="root"></div>

<script type="text/babel">

const {
 BrowserRouter,
 Routes,
 Route,
 Link,
 useNavigate,
 useParams
} = ReactRouterDOM;

function Home() {
 return (
  <div className="container">
   <h1>React Router & Forms Project</h1>
   <p>Student Registration System</p>

   <Link to="/register">
    <button>Register Student</button>
   </Link>
  </div>
 );
}

function Register() {

 const navigate = useNavigate();

 const [formData,setFormData] = React.useState({
  name:"",
  email:"",
  course:""
 });

 const [errors,setErrors] = React.useState({});

 const handleChange=(e)=>{
  setFormData({
   ...formData,
   [e.target.name]:e.target.value
  });
 };

 const validate=()=>{

  let temp={};

  if(!formData.name.trim())
   temp.name="Name is required";

  if(!formData.email.includes("@"))
   temp.email="Enter valid email";

  if(!formData.course.trim())
   temp.course="Course is required";

  setErrors(temp);

  return Object.keys(temp).length===0;
 };

 const handleSubmit=(e)=>{
  e.preventDefault();

  if(validate()){
   navigate(`/student/${formData.name}`);
  }
 };

 return(
  <div className="container">

   <h2>Student Registration Form</h2>

   <form onSubmit={handleSubmit}>

    <label>Name</label>
    <input
      type="text"
      name="name"
      value={formData.name}
      onChange={handleChange}
    />
    <div className="error">{errors.name}</div>

    <label>Email</label>
    <input
      type="email"
      name="email"
      value={formData.email}
      onChange={handleChange}
    />
    <div className="error">{errors.email}</div>

    <label>Course</label>
    <input
      type="text"
      name="course"
      value={formData.course}
      onChange={handleChange}
    />
    <div className="error">{errors.course}</div>

    <button type="submit">Submit</button>

   </form>

  </div>
 );
}

function StudentProfile(){

 const {name}=useParams();

 return(
  <div className="container">

   <h1>Student Profile</h1>

   <h2>Welcome, {name}</h2>

   <p>Registration Successful!</p>

   <Link to="/">
    <button>Home</button>
   </Link>

  </div>
 );
}

function App(){

 return(
  <BrowserRouter>

   <nav>
    <Link to="/">Home</Link>
    <Link to="/register">Register</Link>
   </nav>

   <Routes>
    <Route path="/" element={<Home/>}/>
    <Route path="/register" element={<Register/>}/>
    <Route path="/student/:name" element={<StudentProfile/>}/>
   </Routes>

  </BrowserRouter>
 );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>

</body>
</html>
